<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Products — O.D.I. Electronics</title>
  <style>
    :root{--purple:#6a0dad;--purple-pale:#f0ebff;--dark:#111;--gray-800:#333;--gray-600:#666;--gray-200:#e6e6ea;--gray-100:#f6f6f9;}
    body{font-family:Inter, system-ui, Arial, Helvetica, sans-serif;margin:0;color:var(--dark);background:#fafafa;}
    header{padding:18px 24px;background:#fff;border-bottom:1px solid var(--gray-200)}
    .container{max-width:1120px;margin:28px auto;padding:0 20px}
    .hero{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
    .hero h1{margin:0 0 14px 0;font-size:36px;line-height:1.05}
    .hero p{max-width:680px;color:var(--gray-600);font-size:16px;line-height:1.7}
    .hero img{width:100%;height:auto;border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,.08)}
    .tabs{display:flex;flex-wrap:wrap;gap:10px;margin:28px 0 10px}
    .tab{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:999px;border:1px solid var(--gray-200);background:#fff;color:var(--gray-800);font-size:13px;font-weight:600;text-decoration:none;transition:all .18s}
    .tab.active{border-color:var(--purple);color:var(--purple);background:var(--purple-pale)}
    .catalog-summary{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap}
    .catalog-summary p{margin:0;color:var(--gray-600);font-size:15px}
    .catalog-count{font-size:14px;color:var(--gray-600)}
    .products-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-top:12px}
    .product-card{background:#fff;border:1px solid var(--gray-200);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;transition:transform .28s,box-shadow .28s,opacity .36s,transform .36s;opacity:0;transform:translateY(18px)}
    .product-card.visible{opacity:1;transform:translateY(0)}
    .product-card:hover{transform:translateY(-6px);box-shadow:0 22px 48px rgba(0,0,0,.10);border-color:rgba(106,13,173,.18)}
    .product-card img{width:100%;height:240px;object-fit:cover;background:#f6f4ff;transition:transform .45s ease}
    .product-card:hover img{transform:scale(1.04)}
    .product-card-body{padding:18px 18px 20px;display:flex;flex-direction:column;gap:12px;flex:1}
    .product-card-title{font-size:18px;font-weight:700;color:var(--dark);line-height:1.25}
    .product-card-meta{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .product-price{font-size:18px;font-weight:800;color:var(--purple)}
    .stock-tag{font-size:12px;font-weight:700;padding:8px 10px;border-radius:999px;color:#fff;display:inline-flex;align-items:center;justify-content:center}
    .stock-tag.in{background:#16a34a}
    .stock-tag.out{background:#be123c}
    .product-category{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;background:var(--gray-100);color:var(--gray-600)}
    .product-card-copy{color:var(--gray-600);font-size:14px;line-height:1.7;min-height:52px}
    .product-card-footer{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:auto}
    .btn-link{color:var(--purple);text-decoration:none;font-weight:700;font-size:13px}
    .btn-add{background:var(--purple);color:#fff;border:none;padding:10px 14px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s}
    .btn-add:hover{background:#4b0fa7}
    .empty{padding:60px;text-align:center;color:var(--gray-600);font-size:16px}
    @media(max-width:900px){.hero{grid-template-columns:1fr} .hero img{max-width:100%}}
  </style>
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <header>
    <a href="index.html">← Home</a>
  </header>
  <main class="container">
    <section class="hero">
      <div>
        <div style="font-size:12px;color:var(--purple);font-weight:700;text-transform:uppercase;letter-spacing:1px">Products</div>
        <h1 id="page-title">Browse All Products</h1>
        <p id="page-sub">Explore every appliance in the current store catalog. Click any product for full details and pricing.</p>
      </div>
      <img src="images/appliances-hero.jpg" alt="Products hero image">
    </section>

    <section>
      <div class="catalog-summary">
        <div class="tabs" id="category-tabs"></div>
        <div class="catalog-count" id="catalog-count">Loading products...</div>
      </div>
      <div class="products-grid" id="products-list"></div>
    </section>
  </main>

  <script>
    function getQueryParam(name){
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }
    function parseSizes(name){
      return Array.from(String(name).matchAll(/(\d+)(?:\s*("|INCH|INCHES))?/gi), m => parseInt(m[1], 10));
    }
    function inferCategory(name){
      const value = String(name).toUpperCase();
      if(/TV|INCH/.test(value)) return 'Televisions';
      if(/WASHING/.test(value)) return 'Laundry';
      if(/KETTLE|BLENDER|MICROWAVE|RICE COOKER|COOKER|BURNER/.test(value)) return 'Kitchen';
      if(/FRIDGE|FREEZER/.test(value)) return 'Refrigeration';
      if(/AC\b/.test(value)) return 'Cooling';
      if(/THEATER|SPEAKER|HEADPHONE|SOUND|AUDIO/.test(value)) return 'Audio';
      if(/WALL MOUNT|REMOTE|ACCESSORY/.test(value)) return 'Accessories';
      return 'Other';
    }
    function matchesSize(product, query){
      if(!query) return true;
      const sizeQuery = String(query).trim();
      const numbers = parseSizes(product.name);
      if(!numbers.length) return product.name.toUpperCase().includes(sizeQuery.toUpperCase());
      const exact = parseInt(sizeQuery, 10);
      if(!isNaN(exact)) return numbers.includes(exact);
      const range = sizeQuery.match(/^(\d+)\s*-\s*(\d+)$/);
      if(range){
        const min = parseInt(range[1], 10);
        const max = parseInt(range[2], 10);
        return numbers.some(n => n >= min && n <= max);
      }
      return product.name.toUpperCase().includes(sizeQuery.toUpperCase());
    }
    function buildCategoryLink(category, search){
      const base = category === 'All' ? 'products.html' : 'products.html?category=' + encodeURIComponent(category);
      if(!search) return base;
      return base + (base.includes('?') ? '&' : '?') + `search=${encodeURIComponent(search)}`;
    }
    function formatPageTitle(category, size){
      if(size){
        const label = size.replace(/-/g, '–');
        return category && category !== 'All' ? `${label}" ${category}` : `${label}" Products`;
      }
      return category === 'All' ? 'Browse All Products' : `${category} Products`;
    }
    function formatPrice(price){
      return (price * 1.02).toFixed(2);
    }
    function getProductDescription(product){
      const name = String(product.name).toUpperCase();
      if(/TV|INCH/.test(name)) return 'High-definition television engineered for crisp visuals and smooth streaming.';
      if(/WASHING/.test(name)) return 'Reliable washing machine with strong performance for everyday laundry.';
      if(/KETTLE|BLENDER|MICROWAVE|RICE COOKER|COOKER|BURNER/.test(name)) return 'Versatile kitchen appliance designed for fast, easy meal preparation.';
      if(/FRIDGE|FREEZER/.test(name)) return 'Spacious refrigeration solution to keep food fresh and organized.';
      if(/AC\b/.test(name)) return 'Quiet, energy-efficient cooling for comfortable indoor temperatures.';
      if(/THEATER|SPEAKER|HEADPHONE|SOUND|AUDIO/.test(name)) return 'Premium audio solution for rich sound and immersive listening.';
      if(/WALL MOUNT|REMOTE|ACCESSORY/.test(name)) return 'Handy accessory built to complement your home electronics setup.';
      return 'Quality appliance designed to deliver dependable performance and strong value.';
    }
    function matchesSearch(product, query){
      if(!query) return true;
      const lower = String(query).trim().toLowerCase();
      return String(product.name).toLowerCase().includes(lower) || String(product.category).toLowerCase().includes(lower);
    }

    async function loadProducts(){
      const res = await fetch('data/products.json');
      const products = await res.json();
      const categoryParam = getQueryParam('category');
      const sizeParam = getQueryParam('size');
      const searchParam = getQueryParam('search');
      const categories = ['All', 'Kitchen', 'Laundry', 'Televisions', 'Refrigeration', 'Cooling', 'Audio', 'Accessories', 'Other'];
      const enriched = products.map(p => ({...p, category: inferCategory(p.name)}));
      const selected = categories.includes(categoryParam) ? categoryParam : 'All';
      const filtered = enriched.filter(product =>
        (selected === 'All' || product.category.toLowerCase() === selected.toLowerCase()) &&
        matchesSize(product, sizeParam) &&
        matchesSearch(product, searchParam)
      );

      const tabs = document.getElementById('category-tabs');
      tabs.innerHTML = categories.map(cat => `
        <a class="tab${cat.toLowerCase()===selected.toLowerCase() ? ' active' : ''}" href="${buildCategoryLink(cat, searchParam)}">${cat}</a>
      `).join('');

      document.getElementById('page-title').textContent = formatPageTitle(selected, sizeParam);
      document.getElementById('page-sub').textContent = searchParam
        ? `Showing results for "${searchParam}"${selected !== 'All' ? ` in ${selected}` : ''}.`
        : sizeParam
          ? `Showing ${sizeParam.replace(/-/g, '–')} inch products${selected !== 'All' ? ` in ${selected}` : ''}.`
          : (selected === 'All'
              ? 'Explore every appliance in the current store catalog. Click any product for full details and pricing.'
              : `Viewing all ${selected.toLowerCase()} products available in the current catalog.`);

      const list = document.getElementById('products-list');
      const count = document.getElementById('catalog-count');
      count.textContent = `${filtered.length} product${filtered.length === 1 ? '' : 's'} available`;
      if(!filtered.length){
        const queryLabel = searchParam ? `search term "${searchParam}"` : (sizeParam || selected);
        list.innerHTML = `<div class="empty">No products found for ${queryLabel}.</div>`;
        return;
      }
      function resolveProductImage(product){
        const name = String(product.name).toLowerCase();
        // Prefer real photos for TVs when available
        if(product.category === 'Televisions' || /tv|inch/.test(name)){
          if(name.includes('samsung')) return 'images/samsung43inches.jpg';
          if(name.includes('tcl') && name.includes('55')) return 'images/tcl55inches.jpg';
          if(name.includes('televion')) return 'images/tcl55inches.jpg';
          if(name.includes('55')) return 'images/tcl55inches.jpg';
          if(name.includes('tcl') && name.includes('43')) return 'images/tcl43inches.jpg';
          if(name.includes('nasco') && name.includes('50')) return 'images/nasco50inches.jpg';
          if(name.includes('50')) return 'images/nasco50inches.jpg';
          if(name.includes('nasco') && name.includes('43')) return 'images/nasco43inches.jpg';
          if(name.includes('nasco') && name.includes('32')) return 'images/nasco32inches.jpg';
        }
        // Freezers & fridges
        if(name.includes('nas360')) return 'images/nas360freezer.jpg';
        if(name.includes('2-11') || name.includes('2-11fl')) return 'images/nas2-11fridge.jpg';
        if(name.includes('2-14') || name.includes('2-14fl')) return 'images/nas-2-14fridge.jpg';
        if(name.includes('display fridge') && name.includes('nasco')) return 'images/nascodisplayfridge.jpg';
        if(name.includes('zara 450')) return 'images/450deepfreezer.jpg';
        if(name.includes('display fridge') && name.includes('zara')) return 'images/zaradisplayfridge.jpg';
        // Microwaves
        if(/microwave|midea|media|medea/.test(name)){
          if(name.includes('34')) return 'images/mediamicrowave34litrs.jpg';
          if(name.includes('30')) return 'images/mediamicrowave30litrs.jpg';
          if(name.includes('20')) return 'images/mediamicrowave20litrs.jpg';
        }
        // Washing machines
        if(/wash/.test(name)){
          if(name.includes('7kg')) return 'images/7kgwashinemachine.jpg';
          if(name.includes('5kg')) return 'images/5kgwashingmachine.jpg';
        }
        // Kitchen / burners
        if(name.includes('4 burner') || name.includes('4-burner') || name.includes('4burner')){
          return 'images/nasco4burner.jpg';
        }
        // default to product-specific SVG then placeholder
        return `images/product-${product.id}.svg`;
      }

      list.innerHTML = filtered.map((product, index) => `
        <article class="product-card" style="transition-delay:${index * 60}ms">
          <img src="${resolveProductImage(product)}" alt="${product.name}" loading="lazy" onerror="this.onerror=null;this.src='images/placeholder.svg'">
          <div class="product-card-body">
            <div class="product-category">${product.category}</div>
            <h2 class="product-card-title">${product.name}</h2>
            <p class="product-card-copy">${getProductDescription(product)}</p>
            <div class="product-card-meta">
              <div class="product-price">GHS ${formatPrice(product.price)}</div>
              <span class="stock-tag ${product.stock > 0 ? 'in' : 'out'}">${product.stock > 0 ? 'In stock' : 'Out of stock'}</span>
            </div>
            <div class="product-card-footer">
              <a class="btn-link" href="product.html?id=${product.id}">View details</a>
              <button class="btn-add" onclick="alert('For pricing and availability, contact us on WhatsApp or visit the store.')">Inquire</button>
            </div>
          </div>
        </article>
      `).join('');

      Array.from(list.children).forEach(card => card.classList.add('visible'));
    }
    loadProducts().catch(err => {
      console.error(err);
      document.getElementById('products-list').innerHTML = '<div class="empty">Failed to load product data.</div>';
      document.getElementById('catalog-count').textContent = '0 products available';
    });
  </script>
</body>
</html>
