<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Brands — O.D.I. Electronics</title>
  <style>
    :root{--purple:#6a0dad;--dark:#111;--gray-600:#666}
    body{font-family:Inter, system-ui, Arial, Helvetica, sans-serif;margin:0;color:var(--dark);}
    header{padding:18px 24px;background:#fff;border-bottom:1px solid #eee}
    .container{max-width:1100px;margin:28px auto;padding:0 20px}
    .brand-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-top:18px}
    .brand-card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 8px 20px rgba(0,0,0,.04);text-align:center}
    a{color:var(--purple);text-decoration:none}
  </style>
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <header>
    <a href="index.html">← Home</a>
  </header>
  <main class="container">
    <h1>Brands</h1>
    <p style="color:var(--gray-600)">Browse by brand to see all available models and offers.</p>
    <div class="brand-grid">
      <div class="brand-card"><img src="images/brand-samsung.jpg" alt="Samsung" style="max-width:100%;height:auto"><div style="margin-top:8px;font-weight:700">Samsung</div></div>
      <div class="brand-card"><img src="images/brand-lg.jpg" alt="LG" style="max-width:100%;height:auto"><div style="margin-top:8px;font-weight:700">LG</div></div>
      <div class="brand-card"><img src="images/brand-hisense.jpg" alt="Hisense" style="max-width:100%;height:auto"><div style="margin-top:8px;font-weight:700">Hisense</div></div>
    </div>
  </main>
</body>
</html>
