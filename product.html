<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Product — O.D.I. Electronics</title>
  <style>
    :root{--purple:#6a0dad;--dark:#111;--gray-600:#666}
    body{font-family:Inter, system-ui, Arial, Helvetica, sans-serif;margin:0;color:var(--dark);}
    header{padding:18px 24px;background:#fff;border-bottom:1px solid #eee}
    .container{max-width:1000px;margin:28px auto;padding:0 20px}
    .product{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
    .product img{width:100%;height:auto;border-radius:10px}
    .price{font-size:22px;font-weight:800;color:var(--purple)}
    button{background:var(--purple);color:#fff;border:none;padding:10px 14px;border-radius:8px;margin-top:12px}
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Home</a>
  </header>
  <main class="container">
    <div id="product-detail" class="product">
      <div class="product-media">
        <img id="prod-img" src="images/product-sample.svg" alt="Product image">
      </div>
      <div class="product-info">
        <h1 id="prod-name">Loading…</h1>
        <div id="prod-price" class="price">GHS 0.00</div>
        <p id="prod-desc" style="color:var(--gray-600)"></p>
        <button id="add-cart">Add to Cart</button>
      </div>
    </div>
    <script>
      function getQueryParam(name){
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }
      function formatPrice(price){
        return (price * 1.02).toFixed(2);
      }
      function resolveProductImage(name, id){
        const key = String(name).toLowerCase();
        if(key.includes('samsung')) return 'images/samsung43inches.jpg';
        if(key.includes('tcl') && key.includes('55')) return 'images/tcl55inches.jpg';
        if(key.includes('televion')) return 'images/tcl55inches.jpg';
        if(key.includes('55')) return 'images/tcl55inches.jpg';
        if(key.includes('tcl') && key.includes('43')) return 'images/tcl43inches.jpg';
        if(key.includes('nasco') && key.includes('50')) return 'images/nasco50inches.jpg';
        if(key.includes('50')) return 'images/nasco50inches.jpg';
        if(key.includes('nasco') && key.includes('43')) return 'images/nasco43inches.jpg';
        if(key.includes('nasco') && key.includes('32')) return 'images/nasco32inches.jpg';
        if(key.includes('nas360')) return 'images/nas360freezer.jpg';
        if(key.includes('2-11') || key.includes('2-11fl')) return 'images/nas2-11fridge.jpg';
        if(key.includes('2-14') || key.includes('2-14fl')) return 'images/nas-2-14fridge.jpg';
        if(key.includes('display fridge') && key.includes('nasco')) return 'images/nascodisplayfridge.jpg';
        if(key.includes('zara 450')) return 'images/450deepfreezer.jpg';
        if(key.includes('display fridge') && key.includes('zara')) return 'images/zaradisplayfridge.jpg';
        if(/microwave|midea|media|medea/.test(key)){
          if(key.includes('34')) return 'images/mediamicrowave34litrs.jpg';
          if(key.includes('30')) return 'images/mediamicrowave30litrs.jpg';
          if(key.includes('20')) return 'images/mediamicrowave20litrs.jpg';
        }
        if(/wash/.test(key)){
          if(key.includes('7kg')) return 'images/7kgwashinemachine.jpg';
          if(key.includes('5kg')) return 'images/5kgwashingmachine.jpg';
        }
        if(key.includes('4 burner') || key.includes('4-burner') || key.includes('4burner')) return 'images/nasco4burner.jpg';
        return `images/product-${id}.svg`;
      }
      async function loadProduct(){
        const id = parseInt(getQueryParam('id'),10);
        const res = await fetch('data/products.json');
        const products = await res.json();
        const p = products.find(x=>x.id===id) || products[0];
        document.getElementById('prod-name').textContent = p.name;
        document.getElementById('prod-price').textContent = 'GHS '+formatPrice(p.price);
        document.getElementById('prod-desc').textContent = p.description || 'High quality appliance. Contact us for details.';
        const imgEl = document.getElementById('prod-img');
        const candidate = resolveProductImage(p.name, p.id);
        imgEl.src = candidate;
        imgEl.onerror = () => { imgEl.onerror = null; imgEl.src = 'images/product-sample.svg'; };
        document.getElementById('add-cart').addEventListener('click', ()=>alert('Add to cart: '+p.name+' (static demo)'));
      }
      loadProduct().catch(e=>{console.error(e);document.getElementById('prod-name').textContent='Product not found';});
    </script>
  </main>
</body>
</html>
