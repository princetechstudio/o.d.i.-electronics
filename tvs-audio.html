<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TVs & Audio — O.D.I. Electronics</title>
  <style>
    :root{--purple:#6a0dad;--dark:#111;--gray-600:#666;--gray-200:#e6e6ea;--gray-100:#f6f6f9;}
    body{font-family:Inter, system-ui, Arial, Helvetica, sans-serif;margin:0;color:var(--dark);background:#fafafa;}
    header{padding:18px 24px;background:#fff;border-bottom:1px solid var(--gray-200)}
    .container{max-width:1120px;margin:28px auto;padding:0 20px}
    .hero{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
    .hero h1{margin:0 0 14px 0;font-size:32px}
    .hero p{max-width:680px;color:var(--gray-600);line-height:1.75}
    .hero img{width:100%;height:auto;border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,.08)}
    .section-intro{margin-top:32px;padding:32px;background:#fff;border:1px solid var(--gray-200);border-radius:18px;display:flex;align-items:center;justify-content:space-between;gap:24px}
    .section-intro h2{margin:0;font-size:24px;color:var(--dark)}
    .section-intro p{margin:0;color:var(--gray-600);max-width:680px;line-height:1.7}
    .tv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:24px}
    .product-card{background:#fff;border:1px solid var(--gray-200);border-radius:22px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(0,0,0,.05);transition:transform .3s,box-shadow .3s;opacity:0;transform:translateY(18px)}
    .product-card.visible{opacity:1;transform:translateY(0)}
    .product-card:hover{transform:translateY(-4px);box-shadow:0 22px 48px rgba(0,0,0,.12);border-color:rgba(106,13,173,.18)}
    .product-img{height:180px;position:relative;overflow:hidden;background:#f6f4ff;display:flex;align-items:center;justify-content:center;padding:12px}
    .product-img img{max-width:100%;max-height:100%;object-fit:contain;transition:transform .35s ease}
    .product-card:hover .product-img img{transform:scale(1.05)}
    .product-card-body{padding:20px;display:flex;flex-direction:column;gap:14px;flex:1}
    .product-category{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--purple)}
    .product-name{margin:0;font-size:20px;font-weight:700;color:var(--dark);line-height:1.2}
    .product-copy{margin:0;color:var(--gray-600);font-size:14px;line-height:1.75;min-height:54px}
    .product-meta{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .product-price{font-size:20px;font-weight:800;color:var(--purple)}
    .stock-pill{font-size:12px;font-weight:700;padding:8px 12px;border-radius:999px;color:#fff;display:inline-flex;align-items:center;justify-content:center}
    .stock-pill.in{background:#16a34a}
    .stock-pill.out{background:#be123c}
    .product-actions{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:auto}
    .btn-link{color:var(--purple);text-decoration:none;font-weight:700;font-size:13px}
    .btn-action{background:var(--purple);color:#fff;border:none;padding:12px 18px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;transition:background .22s}
    .btn-action:hover{background:#4b0fa7}
    .empty{padding:60px;text-align:center;color:var(--gray-600);font-size:16px}
    @media(max-width:900px){.hero{grid-template-columns:1fr} .hero img{max-width:100%}}
  </style>
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <header>
    <a href="index.html">← Home</a>
  </header>
  <main class="container">
    <section class="hero">
      <div>
        <div style="font-size:12px;color:var(--purple);font-weight:700;text-transform:uppercase;letter-spacing:1px">TVs & Audio</div>
        <h1 id="page-title">TVs & Audio</h1>
        <p id="page-sub">Find smart TVs and display technology from trusted brands.</p>
      </div>
      <img src="images/tvs-audio-hero.jpg" alt="TVs and Audio hero image">
    </section>
    <section class="section-intro">
      <div>
        <h2>Curated TV collection</h2>
        <p>Shop the latest TV models with real photos, premium styling, and fast access to product details.</p>
      </div>
      <div>
        <span style="display:inline-flex;padding:10px 16px;border-radius:999px;background:#f0ebff;color:var(--purple);font-size:13px;font-weight:700">Real TV images included</span>
      </div>
    </section>
    <section class="tv-grid" id="products-grid"></section>
  </main>
  <script>
    function getQueryParam(name){
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }
    function parseSizes(name){
      return Array.from(String(name).matchAll(/(\d+)(?:\s*("|INCH|INCHES))?/gi), m => parseInt(m[1], 10));
    }
    function inferCategory(name){
      const value = String(name).toUpperCase();
      if(/TV|INCH/.test(value)) return 'Televisions';
      if(/WASHING/.test(value)) return 'Laundry';
      if(/KETTLE|BLENDER|MICROWAVE|RICE COOKER|COOKER|BURNER/.test(value)) return 'Kitchen';
      if(/FRIDGE|FREEZER/.test(value)) return 'Refrigeration';
      if(/AC\b/.test(value)) return 'Cooling';
      return 'Other';
    }
    function formatPrice(price){
      return (price * 1.02).toFixed(2);
    }
    function resolveTvImage(name){
      const key = String(name).toLowerCase();
      if(key.includes('samsung')) return 'images/samsung43inches.jpg';
      if(key.includes('tcl') && key.includes('55')) return 'images/tcl55inches.jpg';
      if(key.includes('televion')) return 'images/tcl55inches.jpg';
      if(key.includes('55')) return 'images/tcl55inches.jpg';
      if(key.includes('tcl') && key.includes('43')) return 'images/tcl43inches.jpg';
      if(key.includes('nasco') && key.includes('50')) return 'images/nasco50inches.jpg';
      if(key.includes('50')) return 'images/nasco50inches.jpg';
      if(key.includes('nasco') && key.includes('43')) return 'images/nasco43inches.jpg';
      if(key.includes('nasco') && key.includes('32')) return 'images/nasco32inches.jpg';
      return 'images/placeholder.svg';
    }
    function matchesSize(product, query){
      if(!query) return true;
      const sizeQuery = String(query).trim();
      const numbers = parseSizes(product.name);
      if(!numbers.length) return product.name.toUpperCase().includes(sizeQuery.toUpperCase());
      const exact = parseInt(sizeQuery, 10);
      if(!isNaN(exact)) return numbers.includes(exact);
      const range = sizeQuery.match(/^(\d+)\s*-\s*(\d+)$/);
      if(range){
        const min = parseInt(range[1], 10);
        const max = parseInt(range[2], 10);
        return numbers.some(n => n >= min && n <= max);
      }
      return product.name.toUpperCase().includes(sizeQuery.toUpperCase());
    }
    async function loadProducts(){
      const res = await fetch('data/products.json');
      const products = await res.json();
      const sizeParam = getQueryParam('size');
      const filtered = products.filter(p => inferCategory(p.name) === 'Televisions' && matchesSize(p, sizeParam));
      document.getElementById('page-title').textContent = sizeParam ? `${sizeParam.replace(/-/g,'–')}" TVs` : 'TVs & Audio';
      document.getElementById('page-sub').textContent = sizeParam
        ? `Showing all ${sizeParam.replace(/-/g,'–')} inch television models in stock.`
        : 'Find smart TVs, 4K models, and display options from top brands.';
      const grid = document.getElementById('products-grid');
      if(!filtered.length){
        grid.innerHTML = '<div class="empty">No TV products found for this size.</div>';
        return;
      }
      grid.innerHTML = filtered.map((product, index) => `
        <article class="product-card" style="transition-delay:${index * 60}ms">
          <div class="product-img">
            <img src="${resolveTvImage(product.name)}" alt="${product.name}" loading="lazy" onerror="this.onerror=null;this.src='images/placeholder.svg'" />
          </div>
          <div class="product-card-body">
            <div class="product-category">Television</div>
            <h3 class="product-name">${product.name}</h3>
            <p class="product-copy">High-definition screen and smart features for home entertainment, designed to deliver crisp color and rich sound.</p>
            <div class="product-meta">
              <div class="product-price">GHS ${formatPrice(product.price)}</div>
              <span class="stock-pill ${product.stock > 0 ? 'in' : 'out'}">${product.stock > 0 ? 'In stock' : 'Out of stock'}</span>
            </div>
            <div class="product-actions">
              <a class="btn-link" href="product.html?id=${product.id}">View details</a>
              <button class="btn-action" onclick="alert('Contact us to learn more about this TV.')">Enquire</button>
            </div>
          </div>
        </article>
      `).join('');
      Array.from(grid.children).forEach(card => card.classList.add('visible'));
    }
    loadProducts().catch(err => {
      console.error(err);
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '<div class="empty">Failed to load TV products.</div>';
    });
  </script>
</body>
</html>
