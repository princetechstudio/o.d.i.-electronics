<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Deals — O.D.I. Electronics</title>
  <style>
    :root{--purple:#6a0dad;--dark:#111;--gray-600:#666}
    body{font-family:Inter, system-ui, Arial, Helvetica, sans-serif;margin:0;color:var(--dark);}
    header{padding:18px 24px;background:#fff;border-bottom:1px solid #eee}
    .container{max-width:1100px;margin:28px auto;padding:0 20px}
    .hero{display:flex;gap:24px;align-items:center}
    .hero img{max-width:480px;width:100%;height:auto;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.06)}
    .hero-content h1{margin:0 0 12px 0}
    a{color:var(--purple);text-decoration:none}
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Home</a>
  </header>
  <main class="container">
    <section class="hero">
      <div class="hero-content">
        <div style="font-size:12px;color:var(--purple);font-weight:700">Deals</div>
        <h1>Today's Deals</h1>
        <p style="color:var(--gray-600);max-width:540px">Browse our current promotions, bundles and clearance items.</p>
      </div>
      <img src="images/deals-hero.jpg" alt="Deals hero image">
    </section>
  </main>
</body>
</html>
